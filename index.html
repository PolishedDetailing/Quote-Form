<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polished Detail Garage - Request a Quote</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #1a2e35;
            --gold: #c5a059;
            --cream: #f4f1e1;
            --accent: #4a7c7a;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--cream);
            color: var(--teal);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background-color: var(--white);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            color: var(--teal);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .tagline {
            font-size: 20px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            padding: 15px 25px;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }
        .btn-primary {
            background-color: var(--gold);
            color: var(--teal);
            border: 2px solid var(--gold);
        }
        .btn-primary:hover {
            background-color: #b38e4a;
        }
        .btn-secondary {
            background-color: var(--teal);
            color: var(--white);
            border: 2px solid var(--teal);
        }
        .btn-secondary:hover {
            background-color: #122127;
        }
        .form-section h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: var(--teal);
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            color: var(--teal);
        }
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="tel"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group input[type="submit"] {
            background-color: var(--accent);
            color: var(--white);
            border: none;
            cursor: pointer;
            padding: 12px 20px;
            border-radius: 5px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }
        .form-group input[type="submit"]:hover {
            background-color: #3a6361;
        }
        .footer-contact {
            text-align: center;
            margin-top: 30px;
            font-size: 18px;
            color: var(--teal);
        }
        .footer-contact a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
        }
        .footer-contact a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">POLISHED DETAIL GARAGE</div>
            <div class="tagline">Premium Detailing Services</div>
        </div>

        <div class="btn-group">
            <a href="#quote-form" class="btn btn-primary">Request a Quote</a>
            <a href="https://www.instagram.com/polished.detail.garage" target="_blank" class="btn btn-secondary">Follow on Instagram</a>
        </div>

        <div class="form-section" id="quote-form">
            <h2>Get a Free Quote</h2>
            <form action="https://formspree.io/f/mbdzbvqd method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="email">Email (Optional):</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group">
                    <label for="car_make_model">Car Make & Model:</label>
                    <input type="text" id="car_make_model" name="car_make_model" placeholder="e.g., Porsche 911 GT3RS" required>
                </div>
                <div class="form-group">
                    <label for="service_interest">Service(s) of Interest:</label>
                    <select id="service_interest" name="service_interest" required>
                        <option value="">-- Select a Service --</option>
                        <option value="Exterior Preservation Wash">Exterior Preservation Wash</option>
                        <option value="Interior Cabin Reset">Interior Cabin Reset</option>
                        <option value="The Essential Duo">The Essential Duo</option>
                        <option value="Full Interior Restoration">Full Interior Restoration</option>
                        <option value="The Polished Full Detail">The Polished Full Detail</option>
                        <option value="Ceramic Coatings">Ceramic Coatings</option>
                        <option value="Paint Correction">Paint Correction</option>
                        <option value="Aviation & Marine">Aviation & Marine</option>
                        <option value="Other">Other (Please specify below)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Additional Details / Special Requests:</label>
                    <textarea id="message" name="message"></textarea>
                </div>
                <div class="form-group">
                    <input type="submit" value="Send Quote Request">
                </div>
            </form>
        </div>

        <div class="footer-contact">
            Or call/text us directly at <a href="tel:+13853501825">385-350-1825</a>
        </div>
    </div>
</body>
</html>
